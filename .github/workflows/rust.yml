name: Rust

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall
      - name: Install Dioxus CLI
        shell: pwsh
        run: |
          $metadata = cargo metadata --format-version 1 --no-deps | ConvertFrom-Json
          $package = $metadata.packages | Where-Object { $_.name -eq "overnotes" } | Select-Object -First 1
          $versionReq = ($package.dependencies | Where-Object { $_.name -eq "dioxus" } | Select-Object -First 1).req
          $dioxusVersion = (($versionReq -replace '^[=^~>< ]+', '') -split ',')[0].Trim()
          Write-Host "Installing dioxus-cli $dioxusVersion to match dioxus dependency $versionReq"
          cargo binstall dioxus-cli --version $dioxusVersion --locked --no-confirm
      - name: Build release
        run: cargo build --release --bin overnotes
      - name: Bundle desktop release
        run: dx bundle --desktop --release --out-dir dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            target/release/overnotes.exe
          generate_release_notes: true
